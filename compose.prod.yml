# PRODUCTION COMPOSE CONFIG
name: utility-watershed-analytics

services:

  # Frontend build container - builds static files to shared volume
  frontend-build:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    volumes:
      - frontend-build:/app/client/dist
    command: sh -c "npm run build && echo 'Frontend build complete - static files ready in /app/client/dist'"
    profiles:
      - build

  # Backend Django server
  server:
    build:
      context: ./server
      target: production
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      # Watershed data cache directory - must match LOADER_DATA_DIR environment variable
      - watershed_data:/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PW=${POSTGRES_PW}
      - POSTGRES_DB=${POSTGRES_DB}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=False
      - APP_ENVIRONMENT=production
      # Data directory for watershed GeoJSON/Parquet caching (created in Dockerfile with proper permissions)
      - LOADER_DATA_DIR=/data
      - WEPPCLOUD_JWT_TOKEN=${WEPPCLOUD_JWT_TOKEN}
      - WEPPCLOUD_JWT_TOKEN_2=${WEPPCLOUD_JWT_TOKEN_2}
      # Gunicorn tuning (override in .env as needed)
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-8}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-180}
      - GUNICORN_KEEPALIVE=${GUNICORN_KEEPALIVE:-5}
      - GUNICORN_MAX_REQUESTS=${GUNICORN_MAX_REQUESTS:-2000}
      - GUNICORN_MAX_REQUESTS_JITTER=${GUNICORN_MAX_REQUESTS_JITTER:-200}
    entrypoint: ["/entrypoint.sh"]
    command:
      - sh
      - -c
      - >
        gunicorn server.wsgi:application
        --bind 0.0.0.0:8000
        --workers $${GUNICORN_WORKERS:-8}
        --worker-class gthread
        --threads $${GUNICORN_THREADS:-2}
        --timeout $${GUNICORN_TIMEOUT:-180}
        --keep-alive $${GUNICORN_KEEPALIVE:-5}
        --max-requests $${GUNICORN_MAX_REQUESTS:-2000}
        --max-requests-jitter $${GUNICORN_MAX_REQUESTS_JITTER:-200}
    depends_on:
      db:
        condition: service_healthy

  # PostgreSQL database with PostGIS
  db:
    image: ${POSTGIS_IMAGE:?POSTGIS_IMAGE must pin the observed production image by digest}
    container_name: postgis
    expose:
      - "5432"
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PW}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend reverse proxy & frontend file server
  caddy:
    image: caddy:2-alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - frontend-build:/app/client/build
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped

volumes:
  caddy_data: {}
  frontend-build: {}
  watershed_data: {}
  postgres_data: {}
