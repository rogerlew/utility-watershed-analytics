name: Database Release Status

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read

jobs:
  status:
    name: Reconcile active release and operational health
    runs-on: [self-hosted, Linux, X64, data-status]
    timeout-minutes: 15
    env:
      ACTIVE_STATUS_URL: ${{ vars.DATA_RELEASE_STATUS_URL }}
      INVENTORY_SNAPSHOT: ${{ vars.DATA_RELEASE_INVENTORY_SNAPSHOT }}
      STORAGE_SNAPSHOT: ${{ vars.DATA_RELEASE_STORAGE_SNAPSHOT }}
      BACKUP_SNAPSHOT: ${{ vars.DATA_RELEASE_BACKUP_SNAPSHOT }}
      ATTEMPT_ROOT: ${{ vars.DATA_RELEASE_ATTEMPT_ROOT }}
    steps:
      - name: Checkout monitoring code
        uses: actions/checkout@v4

      - name: Capture public active release
        run: |
          umask 077
          curl --fail --silent --show-error --max-time 30 \
            "$ACTIVE_STATUS_URL" > active-release-status.json

      - name: Evaluate private release health
        run: |
          umask 077
          scripts/check_database_release_status.py \
            --active-status active-release-status.json \
            --inventory-snapshot "$INVENTORY_SNAPSHOT" \
            --storage-snapshot "$STORAGE_SNAPSHOT" \
            --backup-snapshot "$BACKUP_SNAPSHOT" \
            --attempt-root "$ATTEMPT_ROOT" \
            --report database-release-status.json

      - name: Retain sanitized status report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-release-status-${{ github.run_id }}-${{ github.run_attempt }}
          path: database-release-status.json
          if-no-files-found: warn
          retention-days: 90
