name: Release Tool CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'release-tool/**'
      - 'scripts/build_release_tool_image.sh'
      - 'scripts/verify_release_tool_image.py'
      - 'scripts/tests/test_verify_release_tool_image.py'
      - 'scripts/accept_artifact_client.py'
      - 'scripts/tests/test_accept_artifact_client.py'
      - 'scripts/accept_source_preparation.py'
      - 'scripts/tests/test_accept_source_preparation.py'
      - 'scripts/accept_nasa_enrichment.py'
      - 'scripts/tests/test_accept_nasa_enrichment.py'
      - '.github/workflows/release-tool-ci.yml'
  workflow_call:

jobs:
  validate:
    name: Validate Release Tool
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.9'

      - name: Run CLI and image-verifier tests
        run: |
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=release-tool python -m unittest discover -s release-tool/tests
          PYTHONDONTWRITEBYTECODE=1 python -m unittest scripts.tests.test_verify_release_tool_image
          PYTHONDONTWRITEBYTECODE=1 python -m unittest scripts.tests.test_accept_artifact_client
          PYTHONDONTWRITEBYTECODE=1 python -m unittest scripts.tests.test_accept_source_preparation
          PYTHONDONTWRITEBYTECODE=1 python -m unittest scripts.tests.test_accept_nasa_enrichment

      - name: Build reproducibly and audit image
        run: scripts/build_release_tool_image.sh uwa-release-tool:ci
