name: Build & Deploy Client/Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual triggering from GitHub UI for testing

concurrency:
  group: utility-watershed-analytics-production
  cancel-in-progress: false

jobs:
  server-ci:
    name: Reuse Server CI
    uses: ./.github/workflows/server-ci.yml

  client-ci:
    name: Reuse Client CI
    uses: ./.github/workflows/client-ci.yml

  contract-ci:
    name: Reuse Data Contract CI
    uses: ./.github/workflows/data-contract-ci.yml

  deploy:
    name: Deploy
    needs: [server-ci, client-ci, contract-ci]
    runs-on: [self-hosted, Linux, X64, deploy]
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create protected runtime environment
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
          PRODUCTION_MIGRATION_ENV: ${{ secrets.PRODUCTION_MIGRATION_ENV }}
        run: |
          umask 077
          install -m 0600 /dev/null .env.production-runtime
          printf '%s\n' "$PRODUCTION_ENV" > .env.production-runtime
          install -m 0600 /dev/null .env.production-migration
          printf '%s\n' "$PRODUCTION_MIGRATION_ENV" > .env.production-migration
          test "$(stat -c '%a' .env.production-runtime)" = 600
          test "$(stat -c '%a' .env.production-migration)" = 600

      - name: Deploy under canonical operations lock
        run: >-
          scripts/deploy_application.sh
          --env-file .env.production-runtime
          --migration-env-file .env.production-migration
          --healthcheck-url https://unstable.wepp.cloud/api/schema/

      - name: Deployment Summary
        run: |
          {
            printf '### Deployment Summary\n\n'
            printf '✅ Deployment completed successfully!\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: |
          if [[ -f .env.production-runtime ]]; then
            shred --remove --zero .env.production-runtime \
              || { truncate --size 0 .env.production-runtime; rm .env.production-runtime; }
          fi
          if [[ -f .env.production-migration ]]; then
            shred --remove --zero .env.production-migration \
              || { truncate --size 0 .env.production-migration; rm .env.production-migration; }
          fi
