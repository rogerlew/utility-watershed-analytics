name: Data Contract CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'data-releases/**'
      - 'scripts/validate_release_schemas.py'
      - 'scripts/tests/test_validate_release_schemas.py'
      - 'scripts/release_fingerprints.py'
      - 'scripts/validate_fingerprint_plan_contract.py'
      - 'scripts/tests/test_fingerprint_plan_contract.py'
      - 'scripts/validate_artifact_store_contract.py'
      - 'scripts/tests/test_artifact_store_contract.py'
      - 'scripts/accept_artifact_backup.py'
      - 'scripts/tests/test_artifact_backup_acceptance.py'
      - '.github/workflows/data-contract-ci.yml'
  workflow_call:

jobs:
  validate:
    name: Validate Release Schemas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator dependency
        run: python -m pip install jsonschema==4.23.0

      - name: Validate schemas and fixtures
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/validate_release_schemas.py

      - name: Run validator tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest scripts.tests.test_validate_release_schemas

      - name: Validate fingerprints and plans
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/validate_fingerprint_plan_contract.py

      - name: Run fingerprint and plan tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest scripts.tests.test_fingerprint_plan_contract

      - name: Validate artifact-store contract
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/validate_artifact_store_contract.py

      - name: Run artifact-store contract tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest scripts.tests.test_artifact_store_contract

      - name: Run local artifact-backup acceptance tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest scripts.tests.test_artifact_backup_acceptance
