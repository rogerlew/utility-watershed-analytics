name: Server CI - Build & Test

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'
  workflow_call:

jobs:
  build-and-test:
    name: Build Production Container & Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgis/postgis:latest
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build production Docker image
        run: docker build -f ./server/Dockerfile --target production -t server-test:latest ./server

      - name: Run Django linting (ruff check)
        run: docker run --rm server-test:latest ruff check --no-cache

      - name: Run Django tests in container
        run: docker run --rm --add-host db:127.0.0.1 --network host -e APP_ENVIRONMENT=test -e POSTGRES_USER=test_user -e POSTGRES_PW=test_password -e POSTGRES_DB=test_db -e DJANGO_SECRET_KEY=test-secret-key-for-ci-only -e DEBUG=True server-test:latest python manage.py test

      - name: Prepare clean-build report directory
        run: mkdir -m 0777 clean-build-reports

      - name: Run two independent empty builds
        run: |
          for build in first second; do
            docker run --rm \
              --add-host db:127.0.0.1 \
              --network host \
              -e APP_ENVIRONMENT=test \
              -e POSTGRES_USER=test_user \
              -e POSTGRES_PW=test_password \
              -e POSTGRES_DB=test_db \
              -e DJANGO_SECRET_KEY=test-secret-key-for-ci-only \
              -e DEBUG=True \
              -e DB21_REPORT_PATH=/reports/${build}.json \
              -v "$PWD/clean-build-reports:/reports" \
              server-test:latest \
              python manage.py test \
                server.watershed.test_release_validation.CleanBuildValidationTests.test_clean_build_acceptance
          done

      - name: Compare clean-build fingerprints
        run: |
          cmp clean-build-reports/first.json clean-build-reports/second.json
          sha256sum clean-build-reports/first.json
